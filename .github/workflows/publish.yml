name: Publish CLI

# Tag-triggered publish of @clustercode/cli to the npm registry — the same
# mechanism as the rest of the platform (a git tag drives the release). Push a
# `v<version>` tag whose version matches package.json and this builds, tests,
# and publishes to npm.
#
# dist-tag policy (decided AT publish time — see the "Resolve + verify version"
# step): stable versions publish to `latest`. Prereleases normally publish to
# their preid (alpha/beta/rc), EXCEPT while no stable release yet owns `latest`
# (pre-1.0), when the newest prerelease OWNS `latest` so a plain
# `npm i -g @clustercode/cli` isn't stuck on a stale build. This is self-limiting
# — the moment a real stable claims `latest`, prereleases fall back to their
# preid channel automatically.
#
# WHY decide at publish time (not with a post-publish `npm dist-tag add`): OIDC
# trusted publishing only authenticates the `npm publish` call itself. A separate
# `npm dist-tag add` in the same job has no credential and fails. So the only way
# to move `latest` under OIDC is to publish UNDER `--tag latest`.
#
# Auth: npm TRUSTED PUBLISHING via GitHub OIDC — no NPM_TOKEN, nothing to expire
# or rotate. The npm CLI exchanges the workflow's OIDC token for a short-lived
# publish credential per run, and provenance attestations are generated
# automatically. Requires a one-time trusted-publisher config on npmjs.com for
# @clustercode/cli pointing at this repo + workflow filename (publish.yml).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  publish:
    name: Build + publish @clustercode/cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing needs npm >= 11.5.1; force-upgrade so we don't depend
      # on whatever npm the Node image happens to bundle.
      - name: Ensure OIDC-capable npm
        run: npm install -g npm@latest

      - name: Resolve + verify version
        id: meta
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (version ${TAG_VERSION}) does not match package.json version ${PKG_VERSION}; refusing to publish." >&2
            exit 1
          fi
          # Choose the dist-tag to publish UNDER (OIDC can only set a tag at
          # publish time — see the header comment).
          #   stable (no '-')      → latest
          #   prerelease (has '-') → its preid, UNLESS no stable owns `latest`
          #                          yet (current latest is a prerelease or
          #                          absent), in which case the prerelease owns
          #                          `latest`. Self-limiting: once a stable claims
          #                          `latest`, prereleases fall back to the preid.
          DIST_TAG=latest
          case "$PKG_VERSION" in
            *-*)
              PREID="$(printf '%s' "$PKG_VERSION" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+-([0-9A-Za-z]+).*/\1/')"
              DIST_TAG="$PREID"
              # npm view is an unauthenticated public read — fine here (pre-publish).
              CUR_LATEST="$(npm view @clustercode/cli@latest version 2>/dev/null || echo '')"
              case "$CUR_LATEST" in
                *-*|'') DIST_TAG=latest ;;
              esac
              echo "Current 'latest' is '${CUR_LATEST:-<absent>}' → prerelease publishes to '$DIST_TAG'."
              ;;
          esac
          # Guard: a valid npm dist-tag is a non-numeric identifier. Anything else
          # (odd/numeric preid, malformed version) fails clearly here rather than
          # deep inside `npm publish`.
          if ! printf '%s' "$DIST_TAG" | grep -Eq '^[A-Za-z][A-Za-z0-9-]*$'; then
            echo "::error::Computed npm dist-tag '$DIST_TAG' from version '$PKG_VERSION' is not a valid tag; refusing to publish." >&2
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing @clustercode/cli@$PKG_VERSION with npm dist-tag '$DIST_TAG'"

      - run: npm ci

      - run: npm run build

      - run: npm run test:unit

      # No NODE_AUTH_TOKEN: OIDC trusted publishing authenticates automatically
      # and adds provenance. (Config lives on npmjs.com, not in this repo.)
      # The dist-tag was resolved above and is applied HERE, at publish time —
      # this is the only tag placement OIDC can do (a post-publish `dist-tag add`
      # has no credential and fails), so `latest` tracking is handled entirely by
      # `--tag`, not a follow-up step.
      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public --tag "${{ steps.meta.outputs.dist_tag }}"
