name: Publish CLI

# Tag-triggered publish of @clustercode/cli to the npm registry — the same
# mechanism as the rest of the platform (a git tag drives the release). Push a
# `v<version>` tag whose version matches package.json and this builds, tests,
# and publishes to npm. Prerelease versions go to their preid dist-tag
# (alpha/beta/rc) so `@clustercode/cli@latest` only ever points at a stable
# release; stable versions publish to `latest`.
#
# Auth: npm TRUSTED PUBLISHING via GitHub OIDC — no NPM_TOKEN, nothing to expire
# or rotate. The npm CLI exchanges the workflow's OIDC token for a short-lived
# publish credential per run, and provenance attestations are generated
# automatically. Requires a one-time trusted-publisher config on npmjs.com for
# @clustercode/cli pointing at this repo + workflow filename (publish.yml).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  publish:
    name: Build + publish @clustercode/cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing needs npm >= 11.5.1; force-upgrade so we don't depend
      # on whatever npm the Node image happens to bundle.
      - name: Ensure OIDC-capable npm
        run: npm install -g npm@latest

      - name: Resolve + verify version
        id: meta
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (version ${TAG_VERSION}) does not match package.json version ${PKG_VERSION}; refusing to publish." >&2
            exit 1
          fi
          # npm dist-tag: prerelease (X.Y.Z-<preid>...) → its preid; stable → latest.
          DIST_TAG=latest
          case "$PKG_VERSION" in
            *-*) DIST_TAG="$(printf '%s' "$PKG_VERSION" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+-([0-9A-Za-z]+).*/\1/')" ;;
          esac
          # Guard: a valid npm dist-tag is a non-numeric identifier. Anything else
          # (odd/numeric preid, malformed version) fails clearly here rather than
          # deep inside `npm publish`.
          if ! printf '%s' "$DIST_TAG" | grep -Eq '^[A-Za-z][A-Za-z0-9-]*$'; then
            echo "::error::Computed npm dist-tag '$DIST_TAG' from version '$PKG_VERSION' is not a valid tag; refusing to publish." >&2
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing @clustercode/cli@$PKG_VERSION with npm dist-tag '$DIST_TAG'"

      - run: npm ci

      - run: npm run build

      - run: npm run test:unit

      # No NODE_AUTH_TOKEN: OIDC trusted publishing authenticates automatically
      # and adds provenance. (Config lives on npmjs.com, not in this repo.)
      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public --tag "${{ steps.meta.outputs.dist_tag }}"

      # Pre-1.0 phase: while there's no stable release yet, keep `latest` on the
      # newest prerelease so a plain `npm i` isn't stuck on a stale build. This
      # SELF-LIMITS: it only moves `latest` when the current `latest` is itself a
      # prerelease (or absent). The moment a real stable version claims `latest`,
      # this stops touching it. Best-effort — if the OIDC credential can't move a
      # dist-tag, it warns and you run the one-liner it prints (publish already
      # succeeded, so this never fails the release).
      - name: Keep 'latest' on the newest prerelease (pre-1.0 only)
        if: contains(steps.meta.outputs.version, '-')
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -uo pipefail
          CUR_LATEST="$(npm view @clustercode/cli@latest version 2>/dev/null || echo '')"
          case "$CUR_LATEST" in
            *-*|'')
              echo "Current 'latest' ($CUR_LATEST) is a prerelease/absent — moving latest → $VERSION"
              if npm dist-tag add "@clustercode/cli@$VERSION" latest; then
                echo "Moved 'latest' → $VERSION"
              else
                echo "::warning::Could not move 'latest' automatically (the OIDC credential may not permit dist-tag changes). Run manually: npm dist-tag add @clustercode/cli@$VERSION latest"
              fi
              ;;
            *)
              echo "Current 'latest' ($CUR_LATEST) is a STABLE release — leaving it untouched." ;;
          esac
